<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Editor</title>
    <link rel="stylesheet" href="editor-style.css">
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar-section">
        <button id="play-slides" title="Play Slides in Browser">▶️ Play</button>
      </div>

      <div class="toolbar-section">
        <label>Slide Layout:
          <select id="slide-style">
            <option value="">Normal slide</option>
            <option value="cover">Cover slide</option>
            <option value="final">Final slide</option>
	  </select>
	</label>
	<label id="slide-clear-label" title="Omit decoration &amp; slide number">
          <input id="slide-clear" type="checkbox">
	  Clear
	</label>
	<label title="Shrink text to fit during play">
          <input id="slide-textfit" type="checkbox">
	  Text Fit
	</label>
      </div>

      <div class="toolbar-section">
        <button id="toggle-view" title="Toggle WYSIWYG/HTML View">🔄 HTML View</button>
      </div>

      <div class="toolbar-section">
        <button id="change-stylesheet" title="Change Style Sheet">🎨 Change style sheet</button>
      </div>

      <div class="toolbar-section">
        <button id="edit-custom-css" title="Edit Custom CSS">✏️ Custom CSS</button>
      </div>

      <div class="toolbar-section">
        <label>
          <input type="checkbox" id="include-b6plus" checked>
          Include b6+ script
        </label>
      </div>
    </div>

    <div class="formatting-toolbar">
      <div class="toolbar-section">
        <button id="format-strong" title="Strong (Cmd/Ctrl+B)" class="format-button"><strong>strong</strong></button>
        <button id="format-emphasis" title="Emphasis (Cmd/Ctrl+I)" class="format-button"><em>em</em></button>
	<!--
        <button id="format-bold" title="Bold" class="format-button"><b>B</b></button>
        <button id="format-italic" title="Italic" class="format-button"><i>I</i></button>
        <button id="format-underline" title="Underline (Cmd/Ctrl+U)" class="format-button"><u>U</u></button>
        <button id="format-strikethrough" title="Strikethrough" class="format-button"><s>S</s></button>
	-->
        <button id="format-code" title="Code" class="format-button"><code>code</code></button>
      </div>

      <div class="toolbar-section">
        <button id="format-link" title="Insert/Remove Link" class="format-button">🔗</button>
        <button id="format-removeformat" title="Remove Formatting" class="format-button">⌫</button>
      </div>

      <div class="toolbar-section">
        <select id="block-format" title="Block Format">
	  <option value="">Blocks &amp containers</option>
          <option value="p">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="h4">Heading 4</option>
          <option value="h5">Heading 5</option>
          <option value="h6">Heading 6</option>
          <option value="address">Address</option>
          <option value="pre">Preformatted</option>
	  <hr>
          <option value="blockquote">Blockquote</option>
          <option value="div">Division</option>
          <option value="details">Details</option>
          <option value="article">Article</option>
          <option value="section">Section</option>
          <option value="aside">Aside</option>
	  <hr>
	  <option value="unwrap">Remove container</option>
	</select>
      </div>

      <div class="toolbar-section">
	<button id="insert-image" title="Insert an image">🖼️</button>
      </div>

      <div class="toolbar-section">
        <button id="format-ul" title="Bulleted List" class="format-button">• List</button>
        <button id="format-ol" title="Numbered List" class="format-button">1. List</button>
	<button id="increase-list-level" title="Push into sub-list" class="format-button">+ List</button>
	<button id="decrease-list-level" title="Pull out of sub-list" class="format-button">− List</button>
      </div>

      <div class="toolbar-section">
	<button id="make-table" title="Insert a table" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><g fill="none" stroke="CurrentColor"><path d="m2 2h124v124h-124z" stroke-width="4"/><g stroke-width="4"><path d="m128 64h-128"/><path d="m64 0v128"/></g></g></svg>
</button>
	<button id="add-header-row" title="Add a table header row" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><path d="m64 56v70" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m2 56h124v70h-124z" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m0 0v44h128v-44zm28 4h10v13h13v10h-13v13h-10v-13h-13v-10h13z" fill="CurrentColor"/><path d="m2 91h124" fill="none" stroke="CurrentColor" stroke-width="4"/></svg></button>
	<button id="add-row" title="Add a table row" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><path d="m64 2v124" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m2 2h124v124h-124z" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m0 42v44h128v-44zm28 4h10v13h13v10h-13v13h-10v-13h-13v-10h13z" fill="CurrentColor"/></svg></button>
	<button id="add-column" title="Add a table column" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><path d="m2 64h124" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m2 2h124v124h-124z" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m42 0v128h44v-128zm17 17h10v13h13v10h-13v13h-10v-13h-13v-10h13z" fill="CurrentColor"/></svg></button>
	<button id="delete-rows" title="Delete table rows" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><path d="m64 2v124" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m2 2h124v124h-124z" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m0 42v44h128v-44zm15 17h36v10h-36z" fill="CurrentColor"/></svg></button>
	<button id="delete-columns" title="Delete table columns" class="format-button"><svg style="height: 1em; vertical-align: text-bottom" viewBox="0 0 128 128"><path d="m2 64h124" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m2 2h124v124h-124z" fill="none" stroke="CurrentColor" stroke-width="4"/><path d="m42 0v128h44v-128zm4 30h36v10h-36z" fill="CurrentColor"/></svg></button>
	<button id="toggle-header-cell" title="Toggle between header and data cell" class="format-button">TH</button>
      </div>

      <div class="toolbar-section">
        <button id="edit-class" title="Edit Class Attribute" class="format-button">Class...</button>
      </div>
    </div>

    <div class="main-container">
      <div class="slides-panel">
        <h3>Slides</h3>
        <div id="slides-list"></div>
        <div class="slides-panel-buttons">
          <button id="add-slide" title="Add Slide">➕ Add Slide</button>
          <button id="add-notes" title="Add Speaker Notes">📝 Add Notes</button>
          <button id="delete-slide" title="Delete Current Slide">🗑️ Delete</button>
        </div>
      </div>

      <div class="editor-container">
        <div id="slide-info">
          <span id="current-slide-type">Slide</span>
          <span id="current-slide-number"></span>
        </div>

        <div id="wysiwyg-container">
          <iframe id="editor-frame"></iframe>
        </div>

        <div id="html-container" style="display: none;">
          <textarea id="html-editor"></textarea>
        </div>

        <div id="status-bar">
          <div id="element-path"></div>
	  <div id="notifications" style="display: none">
	    <div id="notifications-text"></div>
	  </div>
      </div>
    </div>

    <!-- Custom CSS Modal -->
    <dialog id="css-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Custom CSS</h3>
          <button id="close-css-modal" class="close-button">✕</button>
        </div>
        <textarea id="custom-css-editor" placeholder="/* Add custom CSS rules here */"></textarea>
        <div class="modal-footer">
          <button id="save-custom-css">Save</button>
          <button id="cancel-custom-css">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Stylesheet Dialog -->
    <dialog id="stylesheet-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Change Style Sheet</h3>
          <button id="close-stylesheet-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="stylesheet-url">CSS URL or file path:</label>
          <input type="text" id="stylesheet-url" placeholder="https://example.com/styles.css or /path/to/styles.css">
          <button id="browse-stylesheet" title="Browse for local CSS file">📁 Browse...</button>
        </div>
        <div class="modal-footer">
          <button id="apply-stylesheet">Apply</button>
          <button id="cancel-stylesheet">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Class Editor Dialog -->
    <dialog id="class-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Class Attribute</h3>
          <button id="close-class-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="class-input">Class name(s):</label>
          <input type="text" id="class-input" placeholder="my-class another-class">
	  <input id="class-what" type="hidden">
          <p><small>Separate multiple classes with spaces</small></p>
        </div>
        <div class="modal-footer">
          <button id="apply-class">Apply</button>
          <button id="remove-class">Remove Class</button>
          <button id="cancel-class">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Language Editor Dialog -->
    <dialog id="language-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Set Language</h3>
          <button id="close-language-dialog" class="close-button">✕</button>
        </div>
        <div>
          <p><small>A language tag according
            to <a target="_blank" href="https://www.rfc-editor.org/info/bcp47"
            >BCP47</a></small></p>
          <label for="language-input">Language code:</label>
          <input type="text" id="language-input"
		 placeholder="en-us, en-gb, zh-hans, ja, fr..."
		 pattern="[a-zA-Z]{2,8}(-[a-zA-Z0-9]+)*">
	  <input id="language-what" type="hidden">
        </div>
        <div class="modal-footer">
          <button id="apply-language">Apply</button>
          <button id="remove-language">Remove Language</button>
          <button id="cancel-language">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Link Dialog -->
    <dialog id="link-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Insert/Edit Link</h3>
          <button id="close-link-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="link-url">URL:</label>
          <input type="text" id="link-url" placeholder="https://example.com">
        </div>
        <div class="modal-footer">
          <button id="apply-link">Apply</button>
          <button id="remove-link">Remove Link</button>
          <button id="cancel-link">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Image Dialog -->
    <dialog id="image-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Insert Image</h3>
          <button id="close-image-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="image-url">Image URL or file path:</label>
          <input type="text" id="image-url" placeholder="https://example.com/image.jpg or /path/to/image.jpg">
          <button id="browse-image" title="Browse for local image file">📁 Browse...</button>
          <label for="alt-text">Text alternative (‘alt text’):</label>
          <input type="text" id="alt-text" placeholder="">
        </div>
        <div class="modal-footer">
          <button id="apply-image">Apply</button>
          <button id="cancel-image">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Open File dialog -->
    <dialog id="open-file-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Open a Slide Deck</h3>
          <button id="close-open-file-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="open-file-url">URL or file path:</label>
          <input type="text" id="open-file-url" placeholder="https://example.com/slides.html or /path/to/slides.html">
          <button id="browse-open-file" title="Browse for local file">📁 Browse...</button>
        </div>
        <div class="modal-footer">
          <button id="apply-open-file">Apply</button>
          <button id="cancel-open-file">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Save As Dialog -->
    <dialog id="save-as-dialog" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Save Slide Deck</h3>
          <button id="close-save-as-dialog" class="close-button">✕</button>
        </div>
        <div>
          <label for="save-as-url">URL or file path:</label>
          <input type="text" id="save-as-url" placeholder="https://example.com/slides.html or /path/to/slides.html">
          <button id="browse-save-as" title="Browse for local file">📁 Browse...</button>
        </div>
        <div class="modal-footer">
          <button id="apply-save-as">Apply</button>
          <button id="cancel-save-as">Cancel</button>
        </div>
      </div>
    </dialog>

    <!-- Password dialog -->
    <!-- TO DO: A button to make the password visible -->
    <dialog id="password-dialog" class="modal">
      <div class="modal-content">
	<div class="modal-header">
	  <h3>User name and password required</h3>
	  <button id="close-password-dialog" class="close-button">✕</button>
	</div>
	<div>
	  <p>URL: <span id="password-dialog-url"></span></p>
	  <p>Realm: <span id="password-dialog-realm"></span></p>
	  <label for="password-dialog-username-input">User name:</label>
          <input type="text" id="password-dialog-username-input">
	  <label for="password-dialog-password-input">Password:</label>
          <input type="password" id="password-dialog-password-input">
        </div>
        <div class="modal-footer">
          <button id="apply-password">Apply</button>
          <button id="cancel-password">Cancel</button>
        </div>
      </div>
    </dialog>

    <script src="editor.js"></script>
  </body>
</html>
